site_name: Engineering Agents
site_description: ECLSS resilience-loop design docs and SSOS integration guides
docs_dir: docs
exclude_docs: |
  ja/memo/ssos_eclss_loop/e2e_records/
  en/memo/ssos_eclss_loop/e2e_records/
theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - content.code.copy
    - search.suggest
    - search.highlight
plugins:
  - search
  - i18n:
      docs_structure: folder
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: en
          name: English
          default: true
          build: true
          site_name: Engineering Agents
          theme:
            language: en
            palette:
              - scheme: default
                primary: indigo
                accent: indigo
                toggle:
                  icon: material/brightness-7
                  name: Switch to dark mode
              - scheme: slate
                primary: indigo
                accent: indigo
                toggle:
                  icon: material/brightness-4
                  name: Switch to light mode
          nav:
            - Quick start: index.md
            - Overview: overview.md
            - Architecture: architecture.md
            - API contracts: api-contracts.md
            - Engineering guide: AGENTS.md
            - Scenarios:
              - scrubber_degradation: scenario-scrubber-degradation.md
              - ssos_eclss_loop: scenario-ssos-eclss-loop.md
            - SSOS integration:
              - Overview: ssos/index.md
              - Docker setup: ssos/quickstart.md
              - ECLSS integration: ssos/eclss-integration.md
              - EPS integration: ssos/eps-integration.md
              - Troubleshooting: ssos/troubleshooting.md
              - Roadmap: ssos/roadmap.md
              - API reference: ssos/api-reference.md
            - More:
              - CLI guide: cli.md
              - Development plan: development-plan.md
              - One Piece integration: one-piece-integration.md
              - Document catalog: catalog.md
              - Maintenance guide: MAINTENANCE.md
              - Development notes:
                - Backlog: memo/backlog.md
                - MVP plan: memo/scrubber_degradation/mvp_plan.md
                - EPS implementation plan: memo/scrubber_degradation/eps_implementation_plan.md
                - Homogeneous agent team: memo/agents/homogeneous_agent_team_plan.md
                - SSOS ECLSS connection plan: memo/ssos_eclss_loop/ssos_eclss_loop_connection_plan.md
                - SSOS EPS ROS2 plan: memo/ssos_eclss_loop/ssos_eps_ros2_connection_plan.md
                - ROS2 graph investigation: memo/ssos_eclss_loop/ssos_ros2_graph_design_investigation.md
                - ECLSS physical phenomena: memo/ssos_eclss_loop/ssos_eclss_physical_phenomena_overview.md
                - EPS physical phenomena: memo/ssos_eclss_loop/ssos_eps_physical_phenomena_overview.md
                - Persona LLM OOP plan: memo/agents/persona_llm_core_oop_plan.md
                - Persona workshop draft: memo/agents/persona_workshop_draft.md
        - locale: ja
          name: 日本語
          build: true
          site_name: Engineering Agents
          theme:
            language: ja
            palette:
              - scheme: default
                primary: indigo
                accent: indigo
                toggle:
                  icon: material/brightness-7
                  name: ダークモード
              - scheme: slate
                primary: indigo
                accent: indigo
                toggle:
                  icon: material/brightness-4
                  name: ライトモード
          nav:
            - クイックスタート: index.md
            - 概要: overview.md
            - アーキテクチャ: architecture.md
            - API 契約: api-contracts.md
            - エージェントガイド: AGENTS.md
            - シナリオ:
              - scrubber_degradation: scenario-scrubber-degradation.md
              - ssos_eclss_loop: scenario-ssos-eclss-loop.md
            - SSOS 接合:
              - 概要: ssos/index.md
              - Docker セットアップ: ssos/quickstart.md
              - ECLSS 統合: ssos/eclss-integration.md
              - EPS 統合: ssos/eps-integration.md
              - トラブルシューティング: ssos/troubleshooting.md
              - ロードマップ: ssos/roadmap.md
              - API リファレンス: ssos/api-reference.md
            - その他:
              - CLI ガイド: cli.md
              - 開発プラン: development-plan.md
              - One Piece 連携: one-piece-integration.md
              - ドキュメント索引: catalog.md
              - 保守ガイド: MAINTENANCE.md
              - 開発メモ:
                - バックログ: memo/backlog.md
                - MVP プラン: memo/scrubber_degradation/mvp_plan.md
                - EPS 実装プラン: memo/scrubber_degradation/eps_implementation_plan.md
                - 同種エージェントチーム: memo/agents/homogeneous_agent_team_plan.md
                - SSOS ECLSS 接合プラン: memo/ssos_eclss_loop/ssos_eclss_loop_connection_plan.md
                - SSOS EPS ROS2 接合プラン: memo/ssos_eclss_loop/ssos_eps_ros2_connection_plan.md
                - ROS2 グラフ設計調査: memo/ssos_eclss_loop/ssos_ros2_graph_design_investigation.md
                - ECLSS 物理現象: memo/ssos_eclss_loop/ssos_eclss_physical_phenomena_overview.md
                - EPS 物理現象: memo/ssos_eclss_loop/ssos_eps_physical_phenomena_overview.md
                - CLI v3 プラン: memo/cli_v3_plan.md
                - Persona LLM OOP: memo/agents/persona_llm_core_oop_plan.md
                - Persona ワークショップ: memo/agents/persona_workshop_draft.md
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
      toc_depth: 3
validation:
  links:
    not_found: warn
